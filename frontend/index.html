<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SA Team Dashboard | ForteBank</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-chart-line"></i>
                    <span>SA Team Dashboard</span>
                </div>
                <span class="header-subtitle">Системные аналитики | ForteBank</span>
            </div>
            <div class="header-right">
                <div class="last-updated">
                    <i class="fas fa-sync-alt"></i>
                    <span id="lastUpdated">Загрузка...</span>
                </div>
                <div class="status-indicator" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span>Live</span>
                </div>
            </div>
        </header>

        <!-- Summary Cards -->
        <section class="summary-section">
            <div class="summary-card">
                <div class="summary-icon blue"><i class="fas fa-tasks"></i></div>
                <div class="summary-content">
                    <span class="summary-value" id="totalActive">-</span>
                    <span class="summary-label">Активные задачи</span>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon green"><i class="fas fa-check-circle"></i></div>
                <div class="summary-content">
                    <span class="summary-value" id="totalCompletedToday">-</span>
                    <span class="summary-label">Выполнено сегодня</span>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon purple"><i class="fas fa-calendar-check"></i></div>
                <div class="summary-content">
                    <span class="summary-value" id="totalCompletedMonth">-</span>
                    <span class="summary-label">Выполнено за месяц</span>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon orange"><i class="fas fa-code-branch"></i></div>
                <div class="summary-content">
                    <span class="summary-value" id="totalMRs">-</span>
                    <span class="summary-label">MR за месяц</span>
                </div>
            </div>
            <div class="summary-card">
                <div class="summary-icon teal"><i class="fas fa-file-alt"></i></div>
                <div class="summary-content">
                    <span class="summary-value" id="totalPages">-</span>
                    <span class="summary-label">Страниц Confluence</span>
                </div>
            </div>
            <div class="summary-card" id="alertsSummaryCard">
                <div class="summary-icon red"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="summary-content">
                    <span class="summary-value" id="totalAlerts">-</span>
                    <span class="summary-label">Алерты</span>
                </div>
            </div>
        </section>

        <!-- Alerts Banner -->
        <section class="alerts-section" id="alertsSection" style="display:none;">
            <div class="alerts-header">
                <h3><i class="fas fa-bell"></i> Активные алерты</h3>
                <button class="btn-collapse" onclick="toggleAlerts()">
                    <i class="fas fa-chevron-down" id="alertsToggleIcon"></i>
                </button>
            </div>
            <div class="alerts-list" id="alertsList"></div>
        </section>

        <!-- Employee Cards -->
        <section class="employees-section">
            <h2 class="section-title">Сотрудники</h2>
            <div class="employees-grid" id="employeesGrid">
                <!-- Cards will be generated by JS -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Загрузка данных...</p>
                </div>
            </div>
        </section>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
