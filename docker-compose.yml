version: '3.8'

services:
  dashboard:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - JIRA_TOKEN=${JIRA_TOKEN}
      - CONFLUENCE_TOKEN=${CONFLUENCE_TOKEN}
      - GITLAB_TOKEN=${GITLAB_TOKEN}
    volumes:
      - ./backend/config.yaml:/app/config.yaml
      - ./frontend:/app/frontend
    restart: unless-stopped
